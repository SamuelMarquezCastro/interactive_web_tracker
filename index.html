<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mountain Quest</title>

</head>

<body>

    <main>

        <section id="start-screen" class="screen active">
            <div class="overlay">
                <h1>Mountain Quest</h1>
                <div class="instructions">
                    <p>Snap to start</p>
                    <p>Say "a" to run</p>
                    <p>Clap to jump</p>
                </div>
                <button id="start-button">Start game</button>
            </div>
        </section>


        <section id="game-screen" class="screen">
            <div class="game-shell">
                <div class="game-hud">
                    <div>
                        <h2>Prototype Level</h2>
                        <p>Keyboard test for now: move with D or right arrow, jump with W, up arrow, or space.</p>
                    </div>
                    <p class="score-pill">Score: <span id="hud-score">0</span></p>
                    <button id="finish-button">Go to score</button>
                </div>
                <div id="game-container" aria-label="Game canvas"></div>
            </div>
        </section>


        <section id="score-screen" class="screen ">
            <div class="overlay">
                <h2>Congratulations!</h2>
                <p>Your score: <span id="final-score">0</span></p>
                <button id="restart-button">Restart</button>
            </div>
        </section>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
    <script src="https://p5play.org/v3/planck.min.js"></script>
    <script src="https://p5play.org/v3/p5play.js"></script>
    <script type="module" src="Main.js"></script>
</body>

</html>
